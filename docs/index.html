<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Alpha Director</title>
<style>
:root{
  --bg:#07090f;--bg2:rgba(11,16,28,.9);--bg3:rgba(17,24,40,.85);
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --g:#00e676;--g2:rgba(0,230,118,.12);
  --r:#ff3d71;--r2:rgba(255,61,113,.12);
  --a:#ffd740;--a2:rgba(255,215,64,.12);
  --b:#448aff;--b2:rgba(68,138,255,.12);
  --t:#e2e8f0;--t2:#64748b;--t3:#334155;
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t);font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;font-feature-settings:"tnum";min-height:100vh;line-height:1.4}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--t3);border-radius:3px}

/* ── Ticker tape ── */
.tape-wrap{background:rgba(0,0,0,.5);border-bottom:1px solid var(--border);overflow:hidden;height:30px;display:flex;align-items:center}
.tape{display:flex;gap:32px;white-space:nowrap;animation:scroll 60s linear infinite;padding:0 20px}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tape-item{font-size:11px;font-weight:600;display:flex;align-items:center;gap:6px}
.tape-sym{color:var(--t2)}

/* ── Header ── */
.hdr{position:sticky;top:0;z-index:99;background:rgba(7,9,15,.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:12px 24px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.hdr-brand{font-size:15px;font-weight:800;letter-spacing:-0.3px;background:linear-gradient(135deg,#448aff,#00e676);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-sub{font-size:11px;color:var(--t2);margin-top:1px}
.regime-pill{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
.regime-on{background:var(--g2);color:var(--g);border:1px solid rgba(0,230,118,.3)}
.regime-caution{background:var(--a2);color:var(--a);border:1px solid rgba(255,215,64,.3)}
.regime-off{background:var(--r2);color:var(--r);border:1px solid rgba(255,61,113,.3)}

/* ── Layout ── */
.main{max-width:1680px;margin:0 auto;padding:20px 24px}
.section{margin-bottom:28px}
.sec-label{font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--t3);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Index tiles ── */
.idx-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
.idx-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;position:relative;overflow:hidden;transition:border-color .2s}
.idx-card:hover{border-color:var(--border2)}
.idx-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 60%,rgba(255,255,255,.02));pointer-events:none}
.idx-name{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t2);margin-bottom:6px}
.idx-price{font-size:20px;font-weight:800;line-height:1}
.idx-chg{font-size:12px;font-weight:600;margin-top:3px}

/* ── Portfolio summary bar ── */
.port-summary{background:linear-gradient(135deg,rgba(11,16,28,.9),rgba(17,24,40,.8));border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;display:flex;gap:28px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.ps-stat{display:flex;flex-direction:column;gap:1px}
.ps-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2)}
.ps-val{font-size:18px;font-weight:800}
.ps-divider{width:1px;background:var(--border);align-self:stretch;display:none}
@media(min-width:600px){.ps-divider{display:block}}

/* ── Portfolio grid ── */
.port-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:12px}

/* ── Stock card ── */
.scard{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:var(--radius);padding:14px;position:relative;transition:transform .15s,box-shadow .15s,border-color .15s;cursor:default}
.scard:hover{transform:translateY(-2px);border-color:var(--border2)}
.scard.v-yes{border-left-color:var(--g)}
.scard.v-wait{border-left-color:var(--a)}
.scard.v-no{border-left-color:var(--r)}
.scard.v-yes:hover{box-shadow:0 6px 28px rgba(0,230,118,.1)}
.scard.v-no:hover{box-shadow:0 6px 28px rgba(255,61,113,.1)}

.sc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.sc-ticker{font-size:17px;font-weight:800;letter-spacing:-.2px}
.sc-theme{font-size:9px;color:var(--t2);margin-top:1px;font-weight:600}
.sc-class{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.sc-class.core{background:var(--b2);color:var(--b)}
.sc-class.swing{background:var(--a2);color:var(--a)}
.sc-class.spec{background:rgba(180,0,255,.12);color:#ce93d8}

.sc-price-row{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.sc-price{font-size:22px;font-weight:800;line-height:1}
.sc-chg{font-size:12px;font-weight:700}

.sc-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.pill{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;background:rgba(255,255,255,.05);color:var(--t2)}
.pill.g{background:var(--g2);color:var(--g)}
.pill.r{background:var(--r2);color:var(--r)}
.pill.a{background:var(--a2);color:var(--a)}

/* P&L bar */
.pnl-bar{margin-bottom:9px}
.pnl-bar-top{display:flex;justify-content:space-between;font-size:10px;color:var(--t2);margin-bottom:3px;font-weight:600}
.pnl-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.pnl-fill{height:100%;border-radius:2px}

/* Analyst bar */
.analyst-section{margin-bottom:8px}
.analyst-bar{display:flex;height:5px;border-radius:3px;overflow:hidden;gap:2px;margin-bottom:3px}
.ab-buy{background:var(--g)}
.ab-hold{background:var(--a)}
.ab-sell{background:var(--r)}
.analyst-counts{display:flex;gap:10px;font-size:9px;color:var(--t2);font-weight:600}
.analyst-counts span.buy{color:var(--g)}
.analyst-counts span.hold{color:var(--a)}
.analyst-counts span.sell{color:var(--r)}

/* Target */
.target-row{display:flex;justify-content:space-between;font-size:10px;color:var(--t2);margin-bottom:7px}
.target-up{color:var(--g);font-weight:700}
.target-dn{color:var(--r);font-weight:700}

/* Verdict row */
.sc-bot{display:flex;justify-content:space-between;align-items:center}
.verdict-badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:800;letter-spacing:.3px}
.verdict-badge.yes{background:var(--g2);color:var(--g)}
.verdict-badge.wait{background:var(--a2);color:var(--a)}
.verdict-badge.no{background:var(--r2);color:var(--r)}

/* Alert badges */
.alert-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px}
.abadge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.3px}
.abadge.danger{background:var(--r2);color:var(--r);animation:pulse 2s infinite}
.abadge.warning{background:var(--a2);color:var(--a)}
.abadge.info{background:var(--b2);color:var(--b)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ── Macro strip ── */
.macro-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.macro-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;text-align:center;transition:border-color .2s}
.macro-card:hover{border-color:var(--border2)}
.mc-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2);margin-bottom:5px}
.mc-val{font-size:20px;font-weight:800}
.mc-sub{font-size:10px;color:var(--t2);margin-top:2px;font-weight:600}

/* ── Sector grid ── */
.sector-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px}
.sec-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;transition:border-color .15s}
.sec-card:hover{border-color:var(--border2)}
.sec-name{font-size:10px;font-weight:700;color:var(--t2)}
.sec-ticker{font-size:9px;color:var(--t3);margin-top:1px}
.sec-right{text-align:right}
.sec-1d{font-size:14px;font-weight:800}
.sec-5d{font-size:9px;color:var(--t2);margin-top:1px}
.trend-up::before{content:'▲ ';font-size:8px;color:var(--g)}
.trend-dn::before{content:'▼ ';font-size:8px;color:var(--r)}

/* ── Crypto ── */
.crypto-top{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:12px}
.btc-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.btc-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2);margin-bottom:4px}
.btc-price{font-size:20px;font-weight:800}
.btc-chg{font-size:12px;font-weight:600;margin-top:2px}

.crypto-port-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.ccard{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
.cc-sym{font-size:13px;font-weight:800}
.cc-theme{font-size:9px;color:var(--t2);margin-top:1px}
.cc-price{font-size:13px;font-weight:700;text-align:right}
.cc-pnl{font-size:10px;font-weight:700;text-align:right;margin-top:1px}

/* ── Fear & Greed ── */
.fg-wrapper{display:grid;grid-template-columns:200px 1fr;gap:16px;align-items:center}
.fg-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center}
.fg-score{font-size:56px;font-weight:900;line-height:1}
.fg-label{font-size:12px;color:var(--t2);margin-top:4px;font-weight:600}
.fg-signal{font-size:11px;margin-top:8px;padding:6px 12px;border-radius:8px}
.fg-bar{width:100%;height:8px;border-radius:4px;background:linear-gradient(90deg,#ff1744,#ffd740,#00e676);margin-top:12px;position:relative}
.fg-needle{position:absolute;top:-4px;width:2px;height:16px;background:white;border-radius:1px;transform:translateX(-50%)}

/* ── Earnings ── */
.earn-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.earn-day{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.earn-dayname{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2);margin-bottom:8px}
.earn-t{font-size:11px;font-weight:700;padding:3px 0;border-bottom:1px solid var(--border)}
.earn-t:last-child{border-bottom:none}
.earn-t.mine{color:var(--g)}
.earn-empty{font-size:10px;color:var(--t3);font-style:italic}

/* ── Macro alert banner ── */
.macro-banner{background:var(--a2);border:1px solid rgba(255,215,64,.2);border-radius:8px;padding:8px 14px;font-size:11px;font-weight:700;color:var(--a);margin-bottom:16px;display:flex;align-items:center;gap:6px}

/* ── Footer ── */
.footer{text-align:center;color:var(--t3);font-size:10px;padding:20px;border-top:1px solid var(--border);margin-top:8px}

/* ── Responsive ── */
@media(max-width:900px){.earn-grid{grid-template-columns:repeat(3,1fr)}.fg-wrapper{grid-template-columns:1fr}}
@media(max-width:640px){.port-grid{grid-template-columns:1fr 1fr}.earn-grid{grid-template-columns:repeat(2,1fr)}.main{padding:14px 14px}.hdr{padding:10px 14px}}
@media(max-width:420px){.port-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<!-- Ticker tape -->
<div class="tape-wrap">
  <div class="tape" id="tape"></div>
</div>

<!-- Header -->
<div class="hdr">
  <div>
    <div class="hdr-brand">⚡ Alpha Director</div>
    <div class="hdr-sub" id="updated"></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div id="regime-pill" class="regime-pill"></div>
  </div>
</div>

<div class="main">

<!-- Macro alert banner -->
<div id="macro-banner" style="display:none" class="macro-banner"></div>

<!-- Market Indices -->
<div class="section">
  <div class="sec-label">Market Overview</div>
  <div class="idx-grid" id="idx-grid"></div>
</div>

<!-- Portfolio Summary -->
<div class="section">
  <div class="sec-label">Portfolio</div>
  <div class="port-summary" id="port-summary"></div>
  <div class="port-grid" id="port-grid"></div>
</div>

<!-- Macro -->
<div class="section">
  <div class="sec-label">Macro Signals</div>
  <div class="macro-grid" id="macro-grid"></div>
</div>

<!-- Sectors -->
<div class="section">
  <div class="sec-label">Sector Rotation</div>
  <div class="sector-grid" id="sector-grid"></div>
</div>

<!-- Crypto -->
<div class="section">
  <div class="sec-label">Crypto Holdings</div>
  <div class="crypto-top" id="crypto-top"></div>
  <div class="crypto-port-grid" id="crypto-grid"></div>
</div>

<!-- Fear & Greed + Earnings -->
<div style="display:grid;grid-template-columns:220px 1fr;gap:16px;margin-bottom:28px;align-items:start" id="fg-earn-row">
  <div class="section" style="margin:0">
    <div class="sec-label">Sentiment</div>
    <div class="fg-card" id="fg-card"></div>
  </div>
  <div class="section" style="margin:0">
    <div class="sec-label">Earnings This Week</div>
    <div class="earn-grid" id="earn-grid"></div>
  </div>
</div>

</div><!-- main -->

<div class="footer" id="footer"></div>

// ── Helpers ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = (v, dec=2) => v == null ? '—' : (+v).toLocaleString('en-US', {minimumFractionDigits:dec, maximumFractionDigits:dec});
const fmtK = v => v >= 1e6 ? '$'+(v/1e6).toFixed(1)+'M' : v >= 1e3 ? '$'+(v/1e3).toFixed(0)+'K' : '$'+Math.round(v);
const pct = v => v == null ? '—' : (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
const col = v => v == null ? '' : (v >= 0 ? 'positive' : 'negative');
const pos = v => v >= 0;

// ── Ticker tape ────────────────────────────────────────────────────────────
function buildTape() {
  const items = [];
  const mkt = D.market;
  const pairs = [
    ['SPY', mkt.spy], ['QQQ', mkt.qqq],
    ['VIX', mkt.vix], ['Gold', mkt.gold], ['Oil', mkt.oil],
    ['DXY', mkt.dxy], ['10Y', mkt.t10y]
  ];
  for (const [name, d] of pairs) {
    if (!d || !d.price && !d.level && !d.t10y) continue;
    const price = d.price || d.level || d.t10y;
    const chg   = d.chg_1d || 0;
    items.push(`<span class="tape-item"><span class="tape-sym">${name}</span><span class="${col(chg)}">${fmt(price,2)} ${pct(chg)}</span></span>`);
  }
  // duplicate for seamless loop
  const html = items.join('') + items.join('');
  $('tape').innerHTML = html;
}

// ── Regime pill ────────────────────────────────────────────────────────────
function buildRegime() {
  const pill = $('regime-pill');
  const r = D.regime || '';
  $('updated').textContent = 'Updated ' + D.generated_at;
  if (r.includes('RISK-ON') || r.includes('🟢')) {
    pill.className = 'regime-pill regime-on';
  } else if (r.includes('RISK-OFF') || r.includes('🔴')) {
    pill.className = 'regime-pill regime-off';
  } else {
    pill.className = 'regime-pill regime-caution';
  }
  // strip emoji for pill
  pill.textContent = r.replace(/[^\x20-\x7E]/g,'').trim() || 'NEUTRAL';

  const mw = D.macro_warn;
  if (mw) {
    const b = $('macro-banner');
    b.style.display = 'flex';
    const mwText = typeof mw === 'object' ? (mw.risk_level || JSON.stringify(mw)) : mw;
    b.innerHTML = '📅 ' + mwText;
  }
}

// ── Indices ────────────────────────────────────────────────────────────────
function buildIndices() {
  const mkt = D.market;
  const tiles = [
    {name:'S&P 500', d: mkt.spy},
    {name:'NASDAQ',  d: mkt.qqq},
    {name:'VIX',     d: mkt.vix},
    {name:'10Y Yield',d:{price: mkt.t10y?.t10y, chg_1d: null}, suffix:'%'},
    {name:'DXY',     d: mkt.dxy},
    {name:'Gold',    d: mkt.gold, prefix:'$'},
    {name:'Oil WTI', d: mkt.oil, prefix:'$'},
  ];
  $('idx-grid').innerHTML = tiles.map(({name, d, prefix='', suffix=''}) => {
    if (!d) return '';
    const price = d.price ?? d.level ?? d.t10y;
    const chg   = d.chg_1d ?? 0;
    return `<div class="idx-card">
      <div class="idx-name">${name}</div>
      <div class="idx-price">${prefix}${fmt(price,2)}${suffix}</div>
      <div class="idx-chg ${col(chg)}">${pct(chg)}</div>
    </div>`;
  }).join('');
}

// ── Portfolio summary ──────────────────────────────────────────────────────
function buildPortSummary() {
  const p = D.portfolio;
  const pnl = p.total_pnl;
  $('port-summary').innerHTML = `
    <div class="ps-stat">
      <div class="ps-label">Total Value</div>
      <div class="ps-val">${fmtK(p.total_value)}</div>
    </div>
    <div class="ps-divider"></div>
    <div class="ps-stat">
      <div class="ps-label">Cost Basis</div>
      <div class="ps-val">${fmtK(p.total_cost)}</div>
    </div>
    <div class="ps-divider"></div>
    <div class="ps-stat">
      <div class="ps-label">P&L</div>
      <div class="ps-val ${col(pnl)}">${pnl >= 0 ? '+' : ''}${pnl}%  ${fmtK(p.total_value - p.total_cost)}</div>
    </div>
    <div class="ps-divider"></div>
    <div class="ps-stat">
      <div class="ps-label">Positions</div>
      <div class="ps-val">${p.positions.length}</div>
    </div>
    <div class="ps-divider"></div>
    <div class="ps-stat">
      <div class="ps-label">YES Verdicts</div>
      <div class="ps-val ${col(1)}">${p.positions.filter(x=>x.verdict==='YES').length}</div>
    </div>
    <div class="ps-divider"></div>
    <div class="ps-stat">
      <div class="ps-label">NO / Below 200D</div>
      <div class="ps-val ${col(-1)}">${p.positions.filter(x=>x.verdict==='NO').length}</div>
    </div>
  `;
}

// ── Portfolio cards ────────────────────────────────────────────────────────
function buildPortCards() {
  const positions = D.portfolio.positions;
  $('port-grid').innerHTML = positions.map(p => {
    const vclass = p.verdict.toLowerCase();
    const pnlCap = Math.min(Math.max(p.pnl_pct, -100), 200);
    const barW   = Math.abs(pnlCap) / 2; // 0-100% width
    const barCol = p.pnl_pct >= 0 ? 'var(--g)' : 'var(--r)';

    // MA pills
    const ma200  = p.above_200 == null ? '' :
      `<span class="pill ${p.above_200 ? 'g' : 'r'}">MA200 ${p.above_200 ? '▲' : '▼'}</span>`;
    const ma50   = p.above_50 == null ? '' :
      `<span class="pill ${p.above_50 ? 'g' : 'r'}">MA50 ${p.above_50 ? '▲' : '▼'}</span>`;

    // Analyst bar
    const total = (p.buy_pct + p.hold_pct + p.sell_pct) || 1;
    const bPct  = Math.round(p.buy_pct / total * 100);
    const hPct  = Math.round(p.hold_pct / total * 100);
    const sPct  = 100 - bPct - hPct;
    const analSection = p.n_analysts > 0 ? `
      <div class="analyst-section">
        <div class="analyst-bar">
          <div class="ab-buy" style="width:${bPct}%"></div>
          <div class="ab-hold" style="width:${hPct}%"></div>
          <div class="ab-sell" style="width:${sPct}%"></div>
        </div>
        <div class="analyst-counts">
          <span class="buy">${p.buy_n}B</span>
          <span class="hold">${p.hold_n}H</span>
          <span class="sell">${p.sell_n}S</span>
          <span>${p.n_analysts} analysts</span>
        </div>
      </div>` : '';

    // Target
    const targetRow = p.target ? `
      <div class="target-row">
        <span>Target: $${fmt(p.target,0)}</span>
        <span class="${p.upside_pct >= 0 ? 'target-up' : 'target-dn'}">${p.upside_pct >= 0 ? '+' : ''}${p.upside_pct}% upside 🎯</span>
      </div>` : '';

    // Alert
    const alertHtml = p.alert ? `
      <div class="alert-badges">
        <span class="abadge ${p.alert[0]}">${p.alert[1]}</span>
      </div>` : '';

    return `<div class="scard v-${vclass}">
      <div class="sc-top">
        <div>
          <div class="sc-ticker">${p.ticker}</div>
          <div class="sc-theme">${p.theme}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <span class="sc-class ${p.class}">${p.class.toUpperCase()}</span>
        </div>
      </div>

      <div class="sc-price-row">
        <span class="sc-price">$${fmt(p.price,2)}</span>
        <span class="sc-chg ${col(p.chg_1d)}">${pct(p.chg_1d)}</span>
      </div>

      <div class="sc-pills">
        ${ma200}${ma50}
        <span class="pill">Avg $${fmt(p.avg,2)}</span>
      </div>

      <div class="pnl-bar">
        <div class="pnl-bar-top">
          <span>P&L from avg</span>
          <span class="${col(p.pnl_pct)}" style="font-weight:700">${p.pnl_pct >= 0 ? '+' : ''}${p.pnl_pct}%  ${fmtK(p.value - p.cost)}</span>
        </div>
        <div class="pnl-track">
          <div class="pnl-fill" style="width:${barW}%;background:${barCol};margin-left:${p.pnl_pct < 0 ? 0 : 'auto'}"></div>
        </div>
      </div>

      ${analSection}
      ${targetRow}

      <div class="sc-bot">
        <span class="verdict-badge ${vclass}">${p.verdict}</span>
        <span style="font-size:10px;color:var(--t2)">${p.reason}</span>
      </div>
      ${alertHtml}
    </div>`;
  }).join('');
}

// ── Macro strip ────────────────────────────────────────────────────────────
function buildMacro() {
  const m = D.market;
  const vix = m.vix;
  const tiles = [
    {label:'VIX', val: vix.level, chg: vix.chg_1d, sub: vix.signal || ''},
    {label:'DXY', val: m.dxy?.level, chg: m.dxy?.chg_1d, sub: ''},
    {label:'10Y Yield', val: m.t10y?.t10y, suffix:'%', chg: null, sub: m.t10y?.curve?.split('—')[0] || ''},
    {label:'Gold', val: m.gold?.price, prefix:'$', chg: m.gold?.chg, sub: m.gold?.signal || ''},
    {label:'Oil WTI', val: m.oil?.price, prefix:'$', chg: m.oil?.chg, sub: ''},
    {label:'2Y Yield', val: m.t10y?.t2y, suffix:'%', chg: null, sub: ''},
    {label:'Curve', val: m.t10y?.spread, suffix:'%', chg: null, sub: m.t10y?.spread >= 0 ? 'Normal' : 'Inverted'},
  ];
  $('macro-grid').innerHTML = tiles.map(({label, val, chg, sub, prefix='', suffix=''}) => `
    <div class="macro-card">
      <div class="mc-label">${label}</div>
      <div class="mc-val">${prefix}${fmt(val,2)}${suffix}</div>
      ${chg != null ? `<div class="mc-sub ${col(chg)}">${pct(chg)}</div>` : `<div class="mc-sub">${sub}</div>`}
    </div>`).join('');
}

      </div>

}

// ── Fear & Greed ───────────────────────────────────────────────────────────
function buildFG() {
  const fg = D.fear_greed || {};
  const score = fg.score || 50;
  const scoreCol = score > 70 ? 'var(--r)' : score > 55 ? 'var(--a)' : score > 45 ? 'var(--t)' : score > 30 ? 'var(--b)' : 'var(--g)';
  $('fg-card').innerHTML = `
    <div class="mc-label">Fear & Greed</div>
    <div class="fg-score" style="color:${scoreCol}">${score}</div>
    <div class="fg-label">${fg.label || '—'}</div>
    <div class="fg-bar"><div class="fg-needle" style="left:${score}%"></div></div>
    <div style="font-size:10px;margin-top:10px;color:var(--t2)">${(fg.signal||'').replace(/[^\x20-\x7E]/g,'').trim()}</div>
  `;
}

// ── Earnings ───────────────────────────────────────────────────────────────
function buildEarnings() {
  const earn = D.earnings;
  const portTickers = new Set(D.portfolio.positions.map(p => p.ticker));
  const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];
  $('earn-grid').innerHTML = days.map(d => {
    const tickers = earn[d] || [];
    return `<div class="earn-day">
      <div class="earn-dayname">${d}</div>
      ${tickers.length ? tickers.map(t => `<div class="earn-t ${portTickers.has(t) ? 'mine' : ''}">${t}</div>`).join('') :
        '<div class="earn-empty">—</div>'}
    </div>`;
  }).join('');
}
